{% extends 'base.html' %}
{% block title %}Create User — SuperAdmin{% endblock %}

{% block content %}
<div style="max-width:520px;margin:0 auto;">
    <h1 style="margin-bottom:24px;">➕ Create User / Admin</h1>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" required placeholder="Enter username" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email (optional)" />
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required placeholder="Enter password" />
            </div>
            <div class="form-group">
                <label>Role *</label>
                <select name="role" id="roleSelect" onchange="toggleAdminField()">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group" id="adminField">
                <label>Assign to Admin (optional)</label>
                <select name="assigned_admin">
                    <option value="">— None —</option>
                    {% for admin in admins %}
                        <option value="{{ admin.id }}">{{ admin.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="display:flex;gap:12px;">
                <button type="submit" class="btn btn-primary">Create</button>
                <a href="/superadmin/dashboard/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleAdminField() {
    var role = document.getElementById('roleSelect').value;
    document.getElementById('adminField').style.display = role === 'user' ? 'block' : 'none';
}
toggleAdminField();
</script>
{% endblock %}

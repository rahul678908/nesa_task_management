<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Task Manager{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        nav {
            background: #1a1a2e; color: #fff; padding: 14px 28px;
            display: flex; justify-content: space-between; align-items: center;
        }
        nav .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
        nav a { color: #ccc; text-decoration: none; margin-left: 18px; font-size: .9rem; }
        nav a:hover { color: #fff; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 20px; }
        .card {
            background: #fff; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 24px; margin-bottom: 24px;
        }
        h1, h2 { margin-bottom: 16px; }
        .btn {
            display: inline-block; padding: 8px 18px; border-radius: 6px;
            font-size: .875rem; font-weight: 600; cursor: pointer;
            border: none; text-decoration: none; transition: opacity .2s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary   { background: #4361ee; color: #fff; }
        .btn-danger    { background: #ef233c; color: #fff; }
        .btn-success   { background: #2b9348; color: #fff; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: .75rem; font-weight: 600;
        }
        .badge-pending     { background: #fff3cd; color: #856404; }
        .badge-in_progress { background: #cce5ff; color: #004085; }
        .badge-completed   { background: #d4edda; color: #155724; }
        table { width: 100%; border-collapse: collapse; font-size: .9rem; }
        th { background: #f8f9fa; text-align: left; padding: 10px 14px; border-bottom: 2px solid #dee2e6; }
        td { padding: 10px 14px; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
        tr:hover td { background: #f8f9fa; }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card {
            flex: 1; min-width: 140px; background: #fff; border-radius: 10px;
            padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.07);
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #4361ee; }
        .stat-card .label { font-size: .8rem; color: #888; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: .9rem; }
        input, select, textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #ced4da;
            border-radius: 6px; font-size: .9rem;
        }
        textarea { resize: vertical; min-height: 80px; }
        .alert {
            padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: .9rem;
        }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .role-tag {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: .75rem; font-weight: 700; text-transform: uppercase;
        }
        .role-superadmin { background: #6f42c1; color: #fff; }
        .role-admin      { background: #fd7e14; color: #fff; }
        .role-user       { background: #0dcaf0; color: #000; }
    </style>
</head>
<body>
<nav>
    <span class="brand">🗂 Task Manager</span>
    <div>
        {% if user.is_authenticated %}
            <span style="color:#aaa;font-size:.85rem;">
                {{ user.username }}
                <span class="role-tag role-{{ user.role }}">{{ user.role }}</span>
            </span>
            <a href="/logout/">Logout</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
